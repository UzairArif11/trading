name: Deployment of React client

on:
 workflow_dispatch: 
permissions:
  contents: "read"
  id-token: "write"  

env:
  AWS_CI_ROLE: ${{secrets.AWS_CI_ROLE}}
  SG_ID: ${{ secrets.CLIENT_AWS_SG_ID}}
  SSH_KEY: ${{ secrets.CLIENT_SSH_KEY }} 
  USER: ${{ secrets.USER }}
  HOST: ${{ secrets.CLIENT_HOST }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Install dependencies
        run: npm install

      # Echo all environment variables except sensitive ones
      - name: Echo all environment variables (except secrets)
        run: |
          echo "Printing environment variables (sensitive ones are excluded):"
          env | grep -v -e AWS_CI_ROLE -e SG_ID -e SSH_KEY -e USER -e HOST
        
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.AWS_CI_ROLE }}
          role-session-name: deployment
          aws-region: eu-west-2     
          
      - name: Get runner IP
        id: ip
        uses: haythem/public-ip@v1.2
        
      - name: Whitelist runner IP 
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id $SG_ID \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.ip.outputs.ipv4 }}/32"

      - name: Add SSH key to the tmp
        run: echo  "$SSH_KEY" > /tmp/ssh_key && chmod 400 /tmp/ssh_key
        
      - name: Pull latest code
        run: |
          ssh -o StrictHostKeyChecking=no -i "/tmp/ssh_key" $USER@$HOST "
            cd /trade-client
            git pull origin main"

      - name: Build project
        run: |
          ssh -o StrictHostKeyChecking=no -i "/tmp/ssh_key" $USER@$HOST "
            cd /trade-client
            export NVM_DIR=~/.nvm && source ~/.nvm/nvm.sh 
            npm run build"      
            
      - name: Sync Build
        run: |
          ssh -o StrictHostKeyChecking=no -i "/tmp/ssh_key" $USER@$HOST "
            rsync -av --delete ~/trade-client/build/ /var/www/trade-client/build"

      - name: Revoke Runner IP
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id $SG_ID \
            --protocol tcp \
            --port 22 \
            --cidr "${{ steps.ip.outputs.ipv4 }}/32"
